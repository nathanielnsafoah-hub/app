<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#15803d"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Driver Log"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Driver Log — Amenfiman Community Bank</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--g:#15803d;--gd:#14532d;--gl:#dcfce7;--red:#dc2626;--blue:#1d4ed8;--purple:#7c3aed;--bg:#f0fdf4;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
    .hidden{display:none!important}
    select,input,textarea{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:14px;font-size:1rem;color:var(--text);font-weight:600;background:#fff;outline:none;transition:border-color .2s}
    select:focus,input:focus{border-color:var(--g)}
    button{cursor:pointer;border:none;border-radius:14px;font-weight:800;font-size:1rem;transition:opacity .2s}
    button:disabled{opacity:.45;cursor:not-allowed}

    /* ── LOGIN SCREEN ─────────────────────────────────────── */
    #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,var(--gd),var(--g));color:#fff}
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap img{width:90px;height:90px;object-fit:contain;border-radius:18px;background:#fff;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .app-title{font-size:1.7rem;font-weight:900;letter-spacing:.04em;margin-top:12px}
    .app-sub{font-size:.85rem;opacity:.7;margin-top:4px}
    .card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
    .card h2{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:20px;text-align:center}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .driver-info{background:var(--gl);border:2px solid var(--g);border-radius:14px;padding:16px;margin-bottom:16px}
    .driver-info .di-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .driver-info .di-row:last-child{margin-bottom:0}
    .di-icon{font-size:1.5rem}
    .di-label{font-size:.68rem;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.07em}
    .di-value{font-size:1rem;font-weight:900;color:var(--text)}
    .btn-green{background:var(--g);color:#fff;width:100%;padding:16px;font-size:1.05rem;margin-top:4px}
    .btn-green:hover:not(:disabled){background:var(--gd)}
    .err{color:var(--red);font-size:.85rem;text-align:center;margin-top:8px;font-weight:600}

    /* ── ACTIVE SESSION SCREEN ────────────────────────────── */
    #session-screen{padding:0 0 48px}
    .session-header{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:20px 20px 28px;position:relative}
    .session-header h1{font-size:1.2rem;font-weight:900;letter-spacing:.03em}
    .badge-on{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:.72rem;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;margin-top:6px}
    .session-body{padding:16px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .stat-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:16px;text-align:center}
    .stat-card.blue{background:#eff6ff;border-color:#bfdbfe}
    .stat-card.purple{background:#f5f3ff;border-color:#ddd6fe}
    .stat-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
    .stat-value{font-size:1.5rem;font-weight:900;color:var(--text)}
    .km-card{background:linear-gradient(135deg,var(--g),#16a34a);border-radius:20px;padding:24px;text-align:center;color:#fff;margin-bottom:14px;box-shadow:0 4px 20px rgba(21,128,61,.4)}
    .km-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.7);margin-bottom:8px}
    .km-value{font-size:3.5rem;font-weight:900;line-height:1;letter-spacing:-.02em}
    .km-unit{font-size:1rem;font-weight:700;opacity:.8;margin-top:4px}
    .gps-status{font-size:.72rem;opacity:.65;margin-top:8px}
    .info-box{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
    .info-row:last-child{border-bottom:none}
    .info-key{font-size:.8rem;font-weight:600;color:var(--muted)}
    .info-val{font-size:.9rem;font-weight:800;color:var(--text)}
    .btn-red{background:var(--red);color:#fff;width:100%;padding:18px;font-size:1.1rem}
    .btn-red:hover:not(:disabled){background:#b91c1c}
    .notes-area{padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:.9rem;font-weight:600;color:var(--text);resize:none;width:100%;margin-bottom:14px}
    .notes-area:focus{border-color:var(--g);outline:none}
    .report-link{display:block;text-align:center;margin-top:16px;color:var(--g);font-weight:700;font-size:.9rem;text-decoration:none}
    .report-link:hover{text-decoration:underline}
  </style>
</head>
<body>

<!-- ══ LOGIN / BRANCH SELECT SCREEN ══════════════════════════════ -->
<div id="login-screen">
  <div class="logo-wrap">
    <img src="/logo.jpg" alt="Amenfiman"/>
    <div class="app-title">DRIVER LOG</div>
    <div class="app-sub">Amenfiman Community Bank</div>
  </div>

  <div class="card">
    <h2>🚗 Clock In</h2>

    <div class="field">
      <label>Select Branch</label>
      <select id="branch-sel" onchange="onBranchChange()">
        <option value="">— Choose Your Branch —</option>
        <option>HEAD OFFICE</option>
        <option>MICROFINANCE</option>
        <option>DUNKWA</option>
        <option>SEFWI BEKWAI</option>
        <option>SEFWIDWENASE</option>
        <option>AKROPONG MAIN</option>
        <option>AKROPONG HIGH</option>
        <option>BAWDIE</option>
        <option>TARKWA MAIN</option>
        <option>TARKWA TAMSO</option>
        <option>PRESTEA</option>
        <option>MANSO AMENFI</option>
        <option>ASANKO HIGH</option>
        <option>ASANKO MAIN</option>
        <option>SAMREBOI</option>
        <option>ENCHI</option>
        <option>DOMINASE</option>
      </select>
    </div>

    <!-- Driver dropdown (HO / MF / Dunkwa) -->
    <div class="field hidden" id="driver-select-wrap">
      <label>Select Driver</label>
      <select id="driver-sel" onchange="onDriverSelect()">
        <option value="">— Choose Driver —</option>
      </select>
    </div>

    <!-- Auto-filled driver info -->
    <div class="driver-info hidden" id="driver-info">
      <div class="di-row">
        <span class="di-icon">👤</span>
        <div>
          <div class="di-label">Driver Name</div>
          <div class="di-value" id="di-name">—</div>
        </div>
      </div>
      <div class="di-row">
        <span class="di-icon">🚗</span>
        <div>
          <div class="di-label">Vehicle Number</div>
          <div class="di-value" id="di-vehicle" style="color:var(--g);font-size:1.15rem;letter-spacing:.08em">—</div>
        </div>
      </div>
    </div>

    <div class="err hidden" id="login-err"></div>
    <button class="btn-green" id="clock-in-btn" onclick="clockIn()" disabled>🟢 CLOCK IN</button>
    <a href="/driver-report" class="report-link" style="margin-top:14px;display:block">📊 Driver Reports →</a>
  </div>
</div>

<!-- ══ ACTIVE SESSION SCREEN ══════════════════════════════════════ -->
<div id="session-screen" class="hidden">
  <div class="session-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <h1 id="s-driver-name">Driver Name</h1>
        <div id="s-vehicle" style="font-size:.9rem;opacity:.8;font-weight:700;margin-top:2px;letter-spacing:.06em">Vehicle</div>
        <div id="s-branch" style="font-size:.8rem;opacity:.6;margin-top:2px">Branch</div>
      </div>
      <div class="badge-on">🟢 ON DUTY</div>
    </div>
  </div>

  <div class="session-body">
    <!-- KM Counter -->
    <div class="km-card">
      <div class="km-label">Distance Travelled</div>
      <div class="km-value" id="km-display">0.00</div>
      <div class="km-unit">kilometres</div>
      <div class="gps-status" id="gps-status">Acquiring GPS...</div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card blue">
        <div class="stat-label">Clocked In</div>
        <div class="stat-value" id="s-clockin-time">—</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Duration</div>
        <div class="stat-value" id="s-duration">00:00</div>
      </div>
    </div>

    <!-- Driver info -->
    <div class="info-box">
      <div class="info-row"><span class="info-key">Driver</span><span class="info-val" id="s-info-driver">—</span></div>
      <div class="info-row"><span class="info-key">Vehicle</span><span class="info-val" id="s-info-vehicle" style="color:var(--g)">—</span></div>
      <div class="info-row"><span class="info-key">Branch</span><span class="info-val" id="s-info-branch">—</span></div>
    </div>

    <!-- Notes -->
    <textarea id="notes-area" class="notes-area" rows="2" placeholder="Notes (optional, e.g. carried documents to branch...)"></textarea>

    <button class="btn-red" id="clock-out-btn" onclick="clockOut()">🔴 CLOCK OUT</button>
    <a href="/driver-report" class="report-link">📊 View Driver Reports →</a>
  </div>
</div>

<script>
// ── Driver data ───────────────────────────────────────────────────
const HO = [
  {v:'GC-5856-20', n:'DOUGLAS QUAINOO'},
  {v:'GW-9822-23', n:'SIMON ABLORH'},
  {v:'GW-4586-24', n:'MAXWELL APPIAH'},
  {v:'GW-9200-22', n:'DIARI MORO'},
  {v:'GW-2476-17', n:'PRINCE AIDOO'},
  {v:'GW-4416-21', n:'PATRICK ADARKWAH YIADOM'},
  {v:'GW-2472-17', n:'JAMES OFORI'},
  {v:'GW-2876-14', n:'ABRAHAM BIOH'},
  {v:'GT-6873-15', n:'EUGENE YENDU'},
  {v:'GN-1554-25', n:'DANIEL FRIMPONG'},
  {v:'GN-2094-12', n:'YAW ASOMANING'},
  {v:'GR-9200-17', n:'RANSFORD ANTWI BOASIAKO'},
  {v:'AS-3318-16', n:'UNKNOWN DRIVER'},
  {v:'GN-1015-25', n:'UNKNOWN DRIVER'},
];
const MF = [
  {v:'GW-2478-17', n:'SOLOMON ABEKAH', sub:'GOASO'},
  {v:'GW-2474-17', n:'OKINE ABDULLAI', sub:'ELUBO'},
  {v:'AS-5830-23', n:'UNKNOWN DRIVER', sub:'BEREKUM'},
];
const DUNKWA = [
  {v:'GW-9753-13', n:'FRANCIS ACHEAMPONG'},
  {v:'GT-8733-24', n:'FRANCIS ACHEAMPONG'},
];
const SINGLE = {
  'SEFWI BEKWAI':  {v:'GW-9424-25', n:'ALEX TAKYI'},
  'SEFWIDWENASE':  {v:'GW-9623-25', n:'PATRICK OSEI'},
  'AKROPONG MAIN': {v:'GW-4903-17', n:'ADABO FRANCIS'},
  'AKROPONG HIGH': {v:'GW-4905-24', n:'CROSBY LARBI'},
  'BAWDIE':        {v:'GW-2473-17', n:'MESHACK BOADI'},
  'TARKWA MAIN':   {v:'GM-1536-16', n:'MAWULI GA'},
  'TARKWA TAMSO':  {v:'GW-6271-17', n:'RICHARD TAKYI'},
  'PRESTEA':       {v:'GW-2477-17', n:'EBENEZER DJANGMAH'},
  'MANSO AMENFI':  {v:'GW-9600-25', n:'NELSON ODURO'},
  'ASANKO HIGH':   {v:'GT-8794-17', n:'ELVIS BOATENG'},
  'ASANKO MAIN':   {v:'GT-8431-24', n:'GEORGE MANTEY'},
  'SAMREBOI':      {v:'GW-4464-24', n:'ROBERT NUM'},
  'ENCHI':         {v:'GW-7920-16', n:'FRANK OFORI'},
  'DOMINASE':      {v:'GT-876-16',  n:'ISAAC BOAFO'},
};

// ── State ─────────────────────────────────────────────────────────
let selectedDriver = null;  // {n, v}
let selectedBranch = '';
let watchId = null;
let lastLat = null, lastLng = null;
let totalKm = 0;
let startTime = null;
let durationTimer = null;
let sessionId = null;
let currentLat = null, currentLng = null;

// ── Haversine ─────────────────────────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371, d2r=Math.PI/180;
  const dLat=(la2-la1)*d2r, dLon=(lo2-lo1)*d2r;
  const a=Math.sin(dLat/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Branch selection ──────────────────────────────────────────────
function onBranchChange(){
  const b = document.getElementById('branch-sel').value;
  selectedBranch = b;
  selectedDriver = null;
  document.getElementById('driver-info').classList.add('hidden');
  document.getElementById('driver-select-wrap').classList.add('hidden');
  document.getElementById('clock-in-btn').disabled = true;

  const sel = document.getElementById('driver-sel');
  sel.innerHTML = '<option value="">— Choose Driver —</option>';

  let list = null;
  if (b === 'HEAD OFFICE') list = HO;
  else if (b === 'MICROFINANCE') list = MF;
  else if (b === 'DUNKWA') list = DUNKWA;

  if (list) {
    list.forEach((d,i) => {
      const label = d.sub ? `${d.n} (${d.sub}) — ${d.v}` : `${d.n} — ${d.v}`;
      sel.insertAdjacentHTML('beforeend', `<option value="${i}">${label}</option>`);
    });
    document.getElementById('driver-select-wrap').classList.remove('hidden');
  } else if (SINGLE[b]) {
    selectedDriver = SINGLE[b];
    showDriverInfo(selectedDriver);
    document.getElementById('clock-in-btn').disabled = false;
  }
}

function onDriverSelect(){
  const val = document.getElementById('driver-sel').value;
  if (val === '') { selectedDriver = null; document.getElementById('driver-info').classList.add('hidden'); document.getElementById('clock-in-btn').disabled = true; return; }
  const b = document.getElementById('branch-sel').value;
  const list = b === 'HEAD OFFICE' ? HO : b === 'MICROFINANCE' ? MF : DUNKWA;
  selectedDriver = list[parseInt(val)];
  showDriverInfo(selectedDriver);
  document.getElementById('clock-in-btn').disabled = false;
}

function showDriverInfo(d){
  document.getElementById('di-name').textContent = d.n;
  document.getElementById('di-vehicle').textContent = d.v;
  document.getElementById('driver-info').classList.remove('hidden');
}

// ── Clock In ──────────────────────────────────────────────────────
async function clockIn(){
  if (!selectedDriver) return;
  document.getElementById('clock-in-btn').disabled = true;
  document.getElementById('login-err').classList.add('hidden');

  let lat=null, lng=null, acc=null;
  try {
    const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000,enableHighAccuracy:true}));
    lat=pos.coords.latitude; lng=pos.coords.longitude; acc=pos.coords.accuracy;
    currentLat=lat; currentLng=lng; lastLat=lat; lastLng=lng;
  } catch(e){ console.warn('GPS unavailable'); }

  const res = await fetch('/api/driver/clock',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({driver_name:selectedDriver.n, vehicle_number:selectedDriver.v, event_type:'clock_in', branch:selectedBranch, latitude:lat, longitude:lng, accuracy:acc, km_consumed:0})
  });
  const data = await res.json();
  if (!res.ok){ showErr(data.error||'Clock-in failed'); document.getElementById('clock-in-btn').disabled=false; return; }

  sessionId = data.id;
  startTime = new Date();
  totalKm = 0;

  // Save session
  localStorage.setItem('ds', JSON.stringify({id:sessionId, driver:selectedDriver, branch:selectedBranch, startTime:startTime.toISOString(), km:0}));

  startSession();
}

function startSession(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('session-screen').classList.remove('hidden');
  document.getElementById('s-driver-name').textContent = selectedDriver.n;
  document.getElementById('s-vehicle').textContent = selectedDriver.v;
  document.getElementById('s-branch').textContent = selectedBranch;
  document.getElementById('s-info-driver').textContent = selectedDriver.n;
  document.getElementById('s-info-vehicle').textContent = selectedDriver.v;
  document.getElementById('s-info-branch').textContent = selectedBranch;
  document.getElementById('s-clockin-time').textContent = startTime.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  startGPS();
  durationTimer = setInterval(updateDuration, 1000);
}

// ── GPS tracking ──────────────────────────────────────────────────
function startGPS(){
  if (!navigator.geolocation){ document.getElementById('gps-status').textContent='GPS not available'; return; }
  watchId = navigator.geolocation.watchPosition(pos=>{
    const {latitude:la, longitude:lo, accuracy:ac} = pos.coords;
    document.getElementById('gps-status').textContent = `GPS: ±${Math.round(ac)}m`;
    currentLat=la; currentLng=lo;
    if (lastLat!==null){
      const d = haversine(lastLat,lastLng,la,lo);
      if (d>0.01){ totalKm=parseFloat((totalKm+d).toFixed(3)); document.getElementById('km-display').textContent=totalKm.toFixed(2); }
    }
    lastLat=la; lastLng=lo;
    const s = JSON.parse(localStorage.getItem('ds')||'{}');
    if (s.id) localStorage.setItem('ds', JSON.stringify({...s,km:totalKm}));
  }, e=>{ document.getElementById('gps-status').textContent='GPS: '+e.message; }, {enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

function updateDuration(){
  if (!startTime) return;
  const diff = Math.floor((Date.now()-startTime.getTime())/1000);
  const h=String(Math.floor(diff/3600)).padStart(2,'0'), m=String(Math.floor(diff%3600/60)).padStart(2,'0');
  document.getElementById('s-duration').textContent=`${h}:${m}`;
}

// ── Clock Out ─────────────────────────────────────────────────────
async function clockOut(){
  document.getElementById('clock-out-btn').disabled = true;
  const notes = document.getElementById('notes-area').value.trim();

  await fetch('/api/driver/clock',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({driver_name:selectedDriver.n, vehicle_number:selectedDriver.v, event_type:'clock_out', branch:selectedBranch, latitude:currentLat, longitude:currentLng, km_consumed:totalKm, destination:notes})
  });

  if (watchId!==null) navigator.geolocation.clearWatch(watchId);
  clearInterval(durationTimer);
  localStorage.removeItem('ds');

  alert(`✅ Clocked out.\nKM Consumed: ${totalKm.toFixed(2)} km\nDriver: ${selectedDriver.n}`);
  location.reload();
}

// ── Restore session on load ───────────────────────────────────────
window.addEventListener('load',()=>{
  const s = JSON.parse(localStorage.getItem('ds')||'null');
  if (s && s.id){
    sessionId = s.id;
    selectedDriver = s.driver;
    selectedBranch = s.branch;
    startTime = new Date(s.startTime);
    totalKm = s.km || 0;
    document.getElementById('km-display').textContent = totalKm.toFixed(2);
    startSession();
  }
});

function showErr(msg){ const e=document.getElementById('login-err'); e.textContent=msg; e.classList.remove('hidden'); }
</script>
</body>
</html>
