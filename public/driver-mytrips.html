<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Trips — Driver Log</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0fdf4;min-height:100vh}
    .header{background:linear-gradient(135deg,#14532d,#15803d);color:#fff;padding:18px 20px}
    .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .header h1{font-size:1.15rem;font-weight:900}
    .header a{background:rgba(255,255,255,.2);color:#fff;padding:8px 14px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.82rem}
    /* Driver identity card */
    .id-card{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px;display:flex;align-items:center;gap:14px}
    .id-avatar{width:44px;height:44px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:#15803d;flex-shrink:0}
    .id-name{font-size:1rem;font-weight:900;color:#fff}
    .id-vehicle{font-size:.82rem;font-weight:700;color:rgba(255,255,255,.75);font-family:monospace;letter-spacing:.06em;margin-top:1px}
    .id-branch{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:1px}
    /* No session */
    #no-session{text-align:center;padding:60px 24px}
    #no-session .icon{font-size:3rem;margin-bottom:16px}
    #no-session h2{font-size:1.1rem;font-weight:800;color:#374151;margin-bottom:8px}
    #no-session p{font-size:.88rem;color:#6b7280;margin-bottom:20px}
    #no-session a{display:inline-block;background:#15803d;color:#fff;padding:12px 24px;border-radius:12px;font-weight:800;text-decoration:none}
    /* Filters */
    .filters{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
    .filters label{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px}
    .filters input{border:2px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:.9rem;font-weight:600;color:#0f172a;outline:none;background:#fff}
    .filters input:focus{border-color:#15803d}
    .filters button{background:#15803d;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:800;cursor:pointer;font-size:.83rem}
    /* Summary */
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 20px}
    .scard{background:#fff;border-radius:14px;border:2px solid #e2e8f0;padding:14px;text-align:center}
    .scard.green{background:#f0fdf4;border-color:#bbf7d0}
    .scard.purple{background:#f5f3ff;border-color:#ddd6fe}
    .scard .sl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:4px}
    .scard .sv{font-size:1.4rem;font-weight:900;color:#0f172a}
    /* Trips */
    .trips{padding:0 20px 40px}
    .trip{background:#fff;border-radius:16px;border:2px solid #e2e8f0;padding:16px;margin-bottom:12px}
    .trip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .trip-date{font-size:.8rem;font-weight:700;color:#64748b}
    .badge{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px}
    .done{background:#dcfce7;color:#15803d}
    .ongoing{background:#fef9c3;color:#92400e}
    .trip-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:.86rem}
    .trip-row:last-child{border-bottom:none}
    .tk{color:#64748b;font-weight:600}
    .tv{font-weight:800;color:#0f172a;text-align:right;max-width:60%;word-break:break-word}
    .km-big{font-size:1.2rem;font-weight:900;color:#7c3aed}
    .loc-link{font-size:.75rem;padding:3px 8px;border-radius:6px;text-decoration:none;font-weight:700;background:#eff6ff;color:#1d4ed8;margin-right:4px}
    .empty{text-align:center;padding:40px 20px;color:#94a3b8}
    .empty .icon{font-size:3rem;margin-bottom:12px}
  </style>
</head>
<body>

<!-- No session screen -->
<div id="no-session" style="display:none">
  <div class="icon">🔐</div>
  <h2>Not Logged In</h2>
  <p>Please clock in first to view your trip history.</p>
  <a href="/driver">← Go to Driver Log</a>
</div>

<!-- Main content -->
<div id="main-content" style="display:none">
  <div class="header">
    <div class="header-top">
      <h1>📋 My Trips</h1>
      <a href="/driver">← Back</a>
    </div>
    <!-- Static driver identity — read from session, NOT editable -->
    <div class="id-card">
      <div class="id-avatar" id="id-initial">?</div>
      <div>
        <div class="id-name" id="id-name">—</div>
        <div class="id-vehicle" id="id-vehicle">—</div>
        <div class="id-branch" id="id-branch">—</div>
      </div>
    </div>
  </div>

  <div class="filters">
    <div><label>Date</label><input type="date" id="f-date"/></div>
    <button onclick="loadTrips()">🔍 Load</button>
  </div>

  <div class="summary">
    <div class="scard"><div class="sl">Trips</div><div class="sv" id="s-trips">0</div></div>
    <div class="scard green"><div class="sl">Completed</div><div class="sv" id="s-done">0</div></div>
    <div class="scard purple"><div class="sl">Total KM</div><div class="sv" id="s-km">0</div></div>
  </div>

  <div class="trips" id="trips-list"></div>
</div>

<script>
let myDriver = null;

window.addEventListener('load', () => {
  // Read driver session saved after PIN login — NO re-login needed
  const raw = sessionStorage.getItem('driverSession');
  if (!raw) {
    document.getElementById('no-session').style.display = 'block';
    return;
  }

  const session = JSON.parse(raw);
  myDriver = session.driver;
  const branch = session.branch;

  // Fill static identity card
  document.getElementById('id-initial').textContent = myDriver.n[0];
  document.getElementById('id-name').textContent = myDriver.n;
  document.getElementById('id-vehicle').textContent = myDriver.v;
  document.getElementById('id-branch').textContent = branch;

  document.getElementById('main-content').style.display = 'block';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  loadTrips();
});

async function loadTrips() {
  if (!myDriver) return;
  const date = document.getElementById('f-date').value;
  const params = new URLSearchParams({ driver_name: myDriver.n });
  if (date) params.set('date', date);

  const res = await fetch('/api/driver/today?' + params);
  const rows = await res.json();
  const sessions = buildSessions(rows);

  let totalKm = 0, done = 0;
  const list = document.getElementById('trips-list');
  list.innerHTML = '';

  if (sessions.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">🚗</div><p>No trips found for this date.</p></div>';
    document.getElementById('s-trips').textContent = 0;
    document.getElementById('s-done').textContent = 0;
    document.getElementById('s-km').textContent = 0;
    return;
  }

  sessions.forEach(s => {
    const km = parseFloat(s.km || 0);
    totalKm += km;
    if (s.status === 'done') done++;
    const inUrl = s.inLat ? `https://maps.google.com/?q=${s.inLat},${s.inLng}` : null;
    const outUrl = s.outLat ? `https://maps.google.com/?q=${s.outLat},${s.outLng}` : null;

    list.insertAdjacentHTML('beforeend', `
      <div class="trip">
        <div class="trip-head">
          <div class="trip-date">${fmtDate(s.inTime)}</div>
          <span class="badge ${s.status === 'done' ? 'done' : 'ongoing'}">${s.status === 'done' ? '✅ Completed' : '🟢 On Duty'}</span>
        </div>
        ${s.fromLoc ? `<div class="trip-row"><span class="tk">📍 From</span><span class="tv">${s.fromLoc}</span></div>` : ''}
        ${s.toLoc ? `<div class="trip-row"><span class="tk">🏁 To</span><span class="tv">${s.toLoc}</span></div>` : ''}
        <div class="trip-row"><span class="tk">Clock In</span><span class="tv">${fmt(s.inTime)}</span></div>
        <div class="trip-row"><span class="tk">Clock Out</span><span class="tv">${fmt(s.outTime)}</span></div>
        <div class="trip-row"><span class="tk">Duration</span><span class="tv">${dur(s.inTime, s.outTime)}</span></div>
        <div class="trip-row"><span class="tk">KM Consumed</span><span class="tv km-big">${km.toFixed(2)} km</span></div>
        ${s.gpsIn ? `<div class="trip-row"><span class="tk">GPS (In)</span><span class="tv" style="font-size:.78rem;color:#64748b">${s.gpsIn}</span></div>` : ''}
        ${s.gpsOut ? `<div class="trip-row"><span class="tk">GPS (Out)</span><span class="tv" style="font-size:.78rem;color:#64748b">${s.gpsOut}</span></div>` : ''}
        <div class="trip-row" style="margin-top:6px;border-bottom:none">
          ${inUrl ? `<a class="loc-link" href="${inUrl}" target="_blank">📍 Clock-in Map</a>` : ''}
          ${outUrl ? `<a class="loc-link" href="${outUrl}" target="_blank">📍 Clock-out Map</a>` : ''}
        </div>
      </div>
    `);
  });

  document.getElementById('s-trips').textContent = sessions.length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-km').textContent = totalKm.toFixed(1);
}

function buildSessions(rows) {
  const asc = [...rows].sort((a, b) => new Date(a.clocked_at) - new Date(b.clocked_at));
  const out = []; let i = 0;
  while (i < asc.length) {
    const r = asc[i];
    if (r.event_type === 'clock_in') {
      const nx = asc[i + 1];
      const isOut = nx && nx.event_type === 'clock_out';
      out.push({
        inTime: r.clocked_at, outTime: isOut ? nx.clocked_at : null,
        inLat: r.latitude, inLng: r.longitude,
        outLat: isOut ? nx.latitude : null, outLng: isOut ? nx.longitude : null,
        km: isOut ? (nx.km_consumed || 0) : (r.km_consumed || 0),
        fromLoc: r.destination || '',
        toLoc: isOut ? (nx.destination || '') : '',
        gpsIn: r.gps_address || '',
        gpsOut: isOut ? (nx.gps_address || '') : '',
        status: isOut ? 'done' : 'ongoing'
      });
      i += isOut ? 2 : 1;
    } else { i++; }
  }
  return out.reverse();
}

function fmt(dt) { if (!dt) return '—'; return new Date(dt).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
function fmtDate(dt) { if (!dt) return '—'; return new Date(dt).toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' }); }
function dur(i, o) { if (!o) return 'On duty'; const s = Math.floor((new Date(o) - new Date(i)) / 1000); return `${String(Math.floor(s / 3600)).padStart(2, '0')}h ${String(Math.floor(s % 3600 / 60)).padStart(2, '0')}m`; }
</script>
</body>
</html>
